# Nixpacks configuration for PHP application
# Railway automatically detects PHP and uses this configuration

[phases.setup]
nixPkgs = ["php82", "php82Extensions.curl", "php82Extensions.mbstring", "php82Extensions.json"]

[phases.install]
cmds = []

[phases.build]
cmds = [
  "echo 'PHP Build Complete'"
]

[start]
cmd = "php -S 0.0.0.0:$PORT -t ."
